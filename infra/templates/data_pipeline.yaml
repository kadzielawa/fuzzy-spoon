# Data Pipeline – NGDI Module Template
# Reference configuration showing how modules map to Terraform resources.

pattern: data_pipeline

modules:
  dataflow:
    source: "git::https://github.com/ngdi/terraform-modules.git//modules/dataflow"
    variables:
      job_name: "{{ service_name }}-job"
      region: "{{ region }}"
      project_id: "{{ project_id }}"
      template_gcs_path: "gs://{{ project_id }}-templates/{{ service_name }}/latest"
      temp_gcs_location: "gs://{{ project_id }}-{{ service_name }}-data/tmp"

  bigquery:
    source: "git::https://github.com/ngdi/terraform-modules.git//modules/bigquery"
    variables:
      dataset_id: "{{ service_name | replace('-', '_') }}"
      location: "{{ region }}"
      description: "Dataset for {{ service_name }} pipeline"

  gcs_bucket:
    source: "git::https://github.com/ngdi/terraform-modules.git//modules/gcs_bucket"
    variables:
      bucket_name: "{{ project_id }}-{{ service_name }}-data"
      location: "{{ region }}"
      storage_class: STANDARD
      versioning_enabled: true

  iam_service_account:
    source: "git::https://github.com/ngdi/terraform-modules.git//modules/iam_service_account"
    variables:
      account_id: "{{ service_name }}-sa"
      display_name: "Service account for {{ service_name }} pipeline"
      project_id: "{{ project_id }}"

  pubsub:
    source: "git::https://github.com/ngdi/terraform-modules.git//modules/pubsub"
    variables:
      topic_name: "{{ service_name }}-input"
      subscription_name: "{{ service_name }}-input-sub"

  network:
    source: "git::https://github.com/ngdi/terraform-modules.git//modules/network"
    variables:
      project_id: "{{ project_id }}"
      region: "{{ region }}"

optional_modules:
  db:
    cloud_sql:
      source: "git::https://github.com/ngdi/terraform-modules.git//modules/cloud_sql"
      variables:
        instance_name: "{{ service_name }}-db"
        region: "{{ region }}"
        database_version: POSTGRES_15
        tier: db-g1-small
