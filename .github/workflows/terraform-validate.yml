name: Terraform Validate & Plan

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-validate.yml'
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Format Check
        working-directory: ./infra/cloud-run
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        working-directory: ./infra/cloud-run
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./infra/cloud-run
        run: terraform validate
        
      - name: Terraform Plan (Dev)
        working-directory: ./infra/cloud-run
        run: |
          terraform plan \
            -var-file="terraform.tfvars.example" \
            -out=tfplan.dev
        continue-on-error: true

      - name: Format Terraform Plan Output
        working-directory: ./infra/cloud-run
        if: github.event_name == 'pull_request'
        run: |
          terraform show -no-color tfplan.dev > tfplan.txt
          echo "## Terraform Plan Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -100 tfplan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./infra/cloud-run/tfplan.txt', 'utf-8');
            const comment = `## 📋 Terraform Plan for Cloud Run Template
            
            \`\`\`
            ${plan.substring(0, 3000)}
            \`\`\`
            
            ${plan.length > 3000 ? '... (truncated, see artifacts for full plan)' : ''}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: infra/cloud-run/tfplan*
          retention-days: 7

  tflint:
    name: TFLint Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache TFLint plugins
        uses: actions/cache@v3
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest

      - name: Run TFLint
        working-directory: ./infra/cloud-run
        run: tflint --init && tflint

  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/cloud-run
          framework: terraform
          quiet: false
          soft_fail: true
          output_format: sarif
          output_file_path: reports/checkov.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: reports/checkov.sarif
          wait-for-processing: true
